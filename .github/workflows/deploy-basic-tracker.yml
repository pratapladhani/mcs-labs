name: 🎮 Deploy Basic Lab Tracker

on:
  push:
    branches: [ feature/gamification-github-pages ]
    paths: [ 'src/**' ]
  workflow_dispatch:

jobs:
  deploy-tracker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Copy tracker files
      run: |
        mkdir -p _site
        cp src/simple-tracker.html _site/index.html
        cp -r src/js _site/ 2>/dev/null || true
        cp -r src/data _site/ 2>/dev/null || true
        cp -r src/styles _site/ 2>/dev/null || true
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  pages: write
  id-token: write